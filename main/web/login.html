<!DOCTYPE html><html><head>
<meta charset=UTF-8>
<title>Login - FLUXGEN IoT Gateway</title>
<meta name=viewport content='width=device-width,initial-scale=1'>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e2e8f0}
.login-card{background:#1e293b;border-radius:16px;padding:40px;width:90%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,0.4)}
.login-card h1{text-align:center;color:#3b82f6;font-size:24px;margin-bottom:8px}
.login-card p{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:30px}
.logo{display:block;margin:0 auto 20px;height:60px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:8px}
.form-group input{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#3b82f6}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-login:hover{opacity:0.9}
.error-msg{color:#f87171;text-align:center;font-size:14px;margin-top:15px;display:none}
.version{text-align:center;color:#475569;font-size:12px;margin-top:20px}
</style>
</head><body>
<div class='login-card'>
<img src='/logo' class='logo' alt='FluxGen'>
<h1>IoT Gateway</h1>
<p>Enter credentials to access the configuration panel</p>
<form id='loginForm' onsubmit='doLogin(event)'>
<div class='form-group'>
<label>Username</label>
<input type='text' id='username' name='username' autocomplete='username' required autofocus>
</div>
<div class='form-group'>
<label>Password</label>
<input type='password' id='password' name='password' autocomplete='current-password' required>
</div>
<button type='submit' class='btn-login'>Sign In</button>
</form>
<div id='error' class='error-msg'></div>
<div class='version'>FluxGen Modbus IoT Gateway v1.3.8</div>
</div>
<script>
function doLogin(e){
e.preventDefault();
var u=document.getElementById('username').value;
var p=document.getElementById('password').value;
var err=document.getElementById('error');
err.style.display='none';
fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'username='+encodeURIComponent(u)+'&password='+encodeURIComponent(p)})
.then(function(r){return r.json()})
.then(function(d){
if(d.success){window.location.href='/';}
else{err.textContent=d.message||'Invalid credentials';err.style.display='block';}
})
.catch(function(e){err.textContent='Connection error';err.style.display='block';});
}
</script>
</body></html>
